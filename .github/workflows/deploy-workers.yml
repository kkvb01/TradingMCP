name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    outputs:
      scanner-mcp: ${{ steps.filter.outputs.scanner-mcp == 'true' || github.event_name == 'workflow_dispatch' }}
      trade-analyzer: ${{ steps.filter.outputs.trade-analyzer == 'true' || github.event_name == 'workflow_dispatch' }}
      trade-journal: ${{ steps.filter.outputs.trade-journal == 'true' || github.event_name == 'workflow_dispatch' }}
      guardrail-engine: ${{ steps.filter.outputs.guardrail-engine == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            scanner-mcp:
              - 'cloudflare/scanner-mcp/**'
            trade-analyzer:
              - 'cloudflare/trade-analyzer/**'
            trade-journal:
              - 'cloudflare/trade-journal/**'
            guardrail-engine:
              - 'cloudflare/guardrail-engine/**'

  scanner-mcp:
    name: Deploy scanner-mcp
    needs: changes
    if: needs.changes.outputs.scanner-mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/scanner-mcp

  trade-analyzer:
    name: Deploy trade-analyzer
    needs: changes
    if: needs.changes.outputs.trade-analyzer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/trade-analyzer

  trade-journal:
    name: Deploy trade-journal
    needs: changes
    if: needs.changes.outputs.trade-journal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/trade-journal

  guardrail-engine:
    name: Deploy guardrail-engine
    needs: changes
    if: needs.changes.outputs.guardrail-engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/guardrail-engine
